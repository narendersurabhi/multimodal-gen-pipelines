name: Repository Artifact Validation

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  validate-repository:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate repository artifacts
        run: python scripts/validate_phase0.py
