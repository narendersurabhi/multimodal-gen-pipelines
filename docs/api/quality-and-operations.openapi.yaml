openapi: 3.1.0
info:
  title: Quality and Operations Control API
  version: 1.0.0
  description: >-
    Administrative API surface for Phase 4 prompt management, model routing,
    review workflows, and audit-event access.
servers:
  - url: https://api.example.com
paths:
  /v1/prompt-versions:
    get:
      summary: List prompt versions for a workflow or task.
      operationId: listPromptVersions
      responses:
        '200':
          description: Prompt versions returned.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - items
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/PromptVersion'
    post:
      summary: Create a prompt version draft.
      operationId: createPromptVersion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PromptVersion'
      responses:
        '201':
          description: Prompt version created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromptVersion'
  /v1/prompt-versions/{prompt_version_id}:activate:
    post:
      summary: Activate an approved prompt version.
      operationId: activatePromptVersion
      parameters:
        - $ref: '#/components/parameters/PromptVersionId'
      responses:
        '202':
          description: Prompt version activation accepted.
  /v1/model-routing-policies:
    get:
      summary: List model routing policies.
      operationId: listModelRoutingPolicies
      responses:
        '200':
          description: Routing policies returned.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - items
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/ModelRoutingPolicy'
    post:
      summary: Create or replace a routing policy.
      operationId: upsertModelRoutingPolicy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModelRoutingPolicy'
      responses:
        '201':
          description: Routing policy stored.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelRoutingPolicy'
  /v1/review-queues/{queue_name}/items:
    get:
      summary: List review queue items for a named queue.
      operationId: listReviewQueueItems
      parameters:
        - $ref: '#/components/parameters/QueueName'
      responses:
        '200':
          description: Review queue items returned.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - items
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/ReviewQueueItem'
  /v1/review-items/{review_item_id}:decision:
    post:
      summary: Submit a review decision for a queue item.
      operationId: decideReviewItem
      parameters:
        - $ref: '#/components/parameters/ReviewItemId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewDecisionRequest'
      responses:
        '200':
          description: Review item updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewQueueItem'
  /v1/audit-events:
    get:
      summary: Search audit events for control-plane and reviewer activity.
      operationId: listAuditEvents
      responses:
        '200':
          description: Audit events returned.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - items
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/AuditEvent'
components:
  parameters:
    PromptVersionId:
      name: prompt_version_id
      in: path
      required: true
      schema:
        type: string
        pattern: '^pv_[a-zA-Z0-9]+$'
    QueueName:
      name: queue_name
      in: path
      required: true
      schema:
        type: string
    ReviewItemId:
      name: review_item_id
      in: path
      required: true
      schema:
        type: string
        pattern: '^rqi_[a-zA-Z0-9]+$'
  schemas:
    PromptVersion:
      $ref: '../schemas/prompt-version.schema.json'
    ModelRoutingPolicy:
      $ref: '../schemas/model-routing-policy.schema.json'
    ReviewQueueItem:
      $ref: '../schemas/review-queue-item.schema.json'
    AuditEvent:
      $ref: '../schemas/audit-event.schema.json'
    ReviewDecisionRequest:
      type: object
      additionalProperties: false
      required:
        - decision
        - reviewer_id
      properties:
        decision:
          type: string
          enum:
            - approved
            - approved_with_edits
            - rejected
            - escalated
            - redaction_required
        reviewer_id:
          type: string
        comment:
          type: string
        edited_output:
          $ref: '../schemas/grounded-summary.schema.json'
